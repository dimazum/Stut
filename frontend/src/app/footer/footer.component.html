<footer class="footer">
  
  <!-- Кнопка Старт -->
  <button class="start-btn" (click)="startListening()" [class.enabled]="isEnabled">
    {{ startBtnName }}
  </button>

  <!-- Блок статистики -->
  <div class="stats">
    <div>Прочитано: <strong>{{ wordsCounter }}/1000</strong></div>
    <div>Скорость: <strong>{{ speedCounter }} слов/мин</strong></div>
    <div><stu-timer [timeLeft]="timeLeftInSec" (finishedEvent)="onTimerFinished()"></stu-timer></div>
  </div>

  <!-- Textarea с распознанным текстом -->
  <div class="text-block">
    <textarea placeholder="Распознанный текст...">{{ text }}</textarea>
  </div>

  <!-- Эквалайзер -->
  <div class="equalizer">
    <app-visualizer></app-visualizer>
  </div>

</footer>
<stu-trigger-modal></stu-trigger-modal>
