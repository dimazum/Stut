<div>
  <h2>Тренируем сложные слова</h2>

  <button (click)="generate()" [disabled]="loading">Сгенерировать</button>

  <p *ngIf="loading">Загрузка...</p>
  <p *ngIf="error" style="color:red">{{ error }}</p>

  <div *ngFor="let key of result | keyvalue">
    <h3>{{ key.key }}</h3>
    <ul>
      <li *ngFor="let line of key.value">{{ line }}</li>
    </ul>
  </div>
</div>
