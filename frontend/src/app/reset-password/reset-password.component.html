<div class="overlay" (click)="closeEvent.emit()">
  <form
    [formGroup]="resetPasswordForm"
    (ngSubmit)="onSubmit()"
    class="register-form"
    (click)="$event.stopPropagation()">
    <button type="button" class="close-btn" (click)="closeEvent.emit()" aria-label="Close">✕</button>

    <h2>Введите новый пароль</h2>

    <div class="form-group">
      <label for="password">Пароль</label>
      <input id="password" formControlName="password" type="password" placeholder="Новый пароль" />
    </div>

    <button type="submit" [disabled]="resetPasswordForm.invalid">Подтвердить</button>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
  </form>
</div>
