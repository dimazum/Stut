version: "3.9"

services:
  traefik:
    image: traefik:v3.6.2

    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      
      # Для DuckDNS используем HTTP challenge
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=dimazum@mail.ru"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory" # staging для теста

      - "--api.dashboard=true"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt

    restart: unless-stopped

    networks:
      - traefik_proxy

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.stut.duckdns.org`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=le"

      - "traefik.http.routers.traefik-dashboard.service=api@internal"

      - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$j801xo4j$$psVjjf0i/.qYlEJKtH/yN/"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth"
      
      # Опционально: редирект HTTP на HTTPS
      - "traefik.http.routers.traefik-dashboard-insecure.rule=Host(`traefik.stut.duckdns.org`)"
      - "traefik.http.routers.traefik-dashboard-insecure.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard-insecure.middlewares=redirect-to-https"
      
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

networks:
  traefik_proxy:
    external: true