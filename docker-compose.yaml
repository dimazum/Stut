version: "3.9"

services:
  backend:
    build: backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - COMMIT_HASH=${COMMIT_HASH}
      - RABBITMQ_HOST=rabbitmq
    ports:
      - 5000:80
    volumes:
      - audio_data:/app/Uploads
    depends_on:
      - rabbitmq

  voice-analyzer:
    build: ./voice-analyzer
    container_name: voice.analyzer
    environment:
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8001:8000"
    volumes:
      - audio_data:/audio
    restart: unless-stopped
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      #- "5672:5672"     # AMQP
      - "15672:15672"   # Management UI (временно для дебага)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  client:
    image: angular-client
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 5001:4200
    environment:
      - NG_ENV=production

  proxy:
    image: nginx:1.21-alpine
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
      - ./proxy/www:/var/www/certbot
      - ./proxy/ssl:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    command: ["nginx", "-g", "daemon off;"]

  certbot:
    image: certbot/certbot
    volumes:
      - ./proxy/www:/var/www/certbot
      - ./proxy/ssl:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done"

  stut.database:
    image: mcr.microsoft.com/mssql/server:2017-latest
    container_name: stut.database
    environment:
      - SA_PASSWORD=Pass@word
      - ACCEPT_EULA=Y
    ports:
      - "5434:1433"
    volumes:
      - ./data:/var/opt/mssql/data

volumes:
  audio_data:
  rabbitmq_data:
